<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMC — Soirée Cinéma 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap">
  </noscript>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

  <style>
    :root {
      --navy-deep:  #0a1628;
      --navy:       #0f1f3d;
      --navy-mid:   #162a50;
      --navy-light: #1d3461;
      --gold:        #c9a84c;
      --gold-light:  #e0c878;
      --gold-bright: #f0d98c;
      --gold-dim:    #8a7235;
      --cream:       #f5efe0;
      --cream-soft:  #ede5d3;
      --white:       #ffffff;
      --white-10:    rgba(255,255,255,0.1);
      --white-20:    rgba(255,255,255,0.2);
      --white-50:    rgba(255,255,255,0.5);
      --white-70:    rgba(255,255,255,0.7);
      --white-90:    rgba(255,255,255,0.9);
      --gold-glow:   rgba(201,168,76,0.3);
      --shadow:      0 4px 30px rgba(0,0,0,0.4);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Outfit', 'Segoe UI', sans-serif;
      --font-accent:  'Cormorant Garamond', Georgia, serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--navy-deep);
      color: var(--white-90);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* NAVIGATION */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--white-10);
      transition: all 0.4s ease;
    }
    nav.scrolled { padding: 0.6rem 2rem; background: rgba(10,22,40,0.95); }
    .nav-logo {
      font-family: var(--font-display); font-size: 1.4rem; font-weight: 700;
      color: var(--gold); text-decoration: none; letter-spacing: 3px;
    }
    .nav-links { display: flex; list-style: none; gap: 2rem; }
    .nav-links a {
      color: var(--white-70); text-decoration: none; font-size: 0.85rem;
      font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
      transition: color 0.3s; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px; background: var(--gold); transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .nav-hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
    .nav-hamburger span { width: 24px; height: 2px; background: var(--gold); transition: all 0.3s; }

    /* HERO */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 6rem 2rem 4rem; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -10%; left: 50%;
      width: 600px; height: 140%;
      background: linear-gradient(180deg, transparent 0%, rgba(201,168,76,0.03) 20%, rgba(201,168,76,0.06) 50%, rgba(201,168,76,0.03) 80%, transparent 100%);
      transform: translateX(-50%);
      clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
      pointer-events: none;
    }
    .hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.5;
    }
    .hero-badge {
      font-family: var(--font-accent); font-size: 1rem; font-weight: 300;
      letter-spacing: 6px; text-transform: uppercase; color: var(--gold);
      margin-bottom: 1rem; opacity: 0; animation: fadeUp 1s 0.3s forwards;
    }
    .hero-title {
      font-family: var(--font-display); font-size: clamp(3rem,8vw,6.5rem);
      font-weight: 900; line-height: 1; margin-bottom: 0.3rem;
      opacity: 0; animation: fadeUp 1s 0.5s forwards;
    }
    .hero-title .line1 { display: block; color: var(--cream); }
    .hero-title .line2 {
      display: block;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-divider {
      width: 60px; height: 1px; background: var(--gold); margin: 1.5rem auto;
      opacity: 0; animation: scaleIn 0.8s 0.8s forwards;
    }
    .hero-info {
      font-family: var(--font-accent); font-size: 1.3rem; font-weight: 300;
      color: var(--white-70); letter-spacing: 2px; margin-bottom: 0.5rem;
      opacity: 0; animation: fadeUp 1s 1s forwards;
    }
    .hero-info strong { color: var(--gold-light); font-weight: 600; }
    .hero-venue {
      font-size: 0.9rem; color: var(--white-50); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 0.8rem;
      opacity: 0; animation: fadeUp 1s 1.2s forwards;
    }
    .hero-free {
      display: none; border: 1px solid var(--gold-dim); padding: 0.4rem 1.5rem;
      font-family: var(--font-accent); font-size: 1rem; letter-spacing: 4px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 2rem;
      opacity: 0; animation: fadeUp 1s 1.3s forwards;
    }
    .hero-cta { opacity: 0; animation: fadeUp 1s 1.5s forwards; }

    /* COUNTDOWN */
    .countdown-section {
      padding: 3rem 2rem; text-align: center;
      background: linear-gradient(180deg, var(--navy-deep) 0%, var(--navy) 100%);
      border-top: 1px solid var(--white-10); border-bottom: 1px solid var(--white-10);
    }
    .countdown-label {
      font-family: var(--font-accent); font-size: 0.9rem; letter-spacing: 4px;
      text-transform: uppercase; color: var(--gold-dim); margin-bottom: 1.5rem;
    }
    .countdown { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
    .countdown-item { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
    .countdown-number { font-family: var(--font-display); font-size: 3rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
    .countdown-unit { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--white-50); margin-top: 0.3rem; }
    .countdown-separator { font-family: var(--font-display); font-size: 2.5rem; color: var(--gold-dim); align-self: flex-start; margin-top: 0.2rem; }
    .countdown-ended { font-family: var(--font-display); font-size: 1.8rem; color: var(--gold); }

    /* PROGRAMME */
    .programme { padding: 5rem 2rem; max-width: 900px; margin: 0 auto; }
    .section-label {
      font-family: var(--font-accent); font-size: 0.85rem; letter-spacing: 5px;
      text-transform: uppercase; color: var(--gold-dim); text-align: center; margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: var(--font-display); font-size: clamp(2rem,5vw,3rem);
      font-weight: 700; text-align: center; color: var(--cream); margin-bottom: 3rem;
    }
    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1px;
      background: linear-gradient(180deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
    }
    .timeline-item { position: relative; padding: 0 0 2.5rem 2rem; }
    .timeline-item::before {
      content: ''; position: absolute; left: -4.5px; top: 6px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 12px var(--gold-glow);
    }
    .timeline-time { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--gold); margin-bottom: 0.2rem; }
    .timeline-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; color: var(--cream); margin-bottom: 0.3rem; }
    .timeline-desc { font-size: 0.9rem; color: var(--white-50); line-height: 1.5; }

    /* INSCRIPTION */
    .inscription {
      padding: 5rem 2rem;
      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
    }
    .form-container {
      max-width: 550px; margin: 0 auto;
      background: rgba(22,42,80,0.4); border: 1px solid var(--white-10);
      border-radius: 2px; padding: 3rem 2.5rem; position: relative; overflow: hidden;
    }
    .form-container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block; font-family: var(--font-accent); font-size: 0.85rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.5rem;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05); border: 1px solid var(--white-20);
      border-radius: 2px; color: var(--white-90); font-family: var(--font-body);
      font-size: 0.95rem; transition: border-color 0.3s, background 0.3s; outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--gold); background: rgba(201,168,76,0.05);
    }
    .form-group input::placeholder { color: var(--white-50); }
    .form-group select option { background: var(--navy); color: var(--white-90); }

    /* BUTTONS */
    .btn-gold {
      display: inline-block; padding: 0.9rem 2.5rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy-deep); font-family: var(--font-body); font-size: 0.85rem;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; border: none; border-radius: 2px; cursor: pointer;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 25px var(--gold-glow); }
    .btn-gold:active { transform: translateY(0); }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline {
      display: inline-block; padding: 0.9rem 2.5rem; background: transparent;
      color: var(--gold); font-family: var(--font-body); font-size: 0.85rem;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; border: 1px solid var(--gold); border-radius: 2px;
      cursor: pointer; transition: all 0.3s ease;
    }
    .btn-outline:hover { background: var(--gold); color: var(--navy-deep); }
    .btn-full { width: 100%; text-align: center; }

    /* TICKET */
    #confirmation { display: none; max-width: 550px; margin: 0 auto; text-align: center; }
    .ticket-card {
      background: linear-gradient(145deg, var(--navy-mid), var(--navy));
      border: 1px solid var(--gold-dim); border-radius: 2px;
      padding: 2.5rem 2rem; position: relative; overflow: hidden; margin-bottom: 1.5rem;
    }
    .ticket-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim));
    }
    .ticket-card::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 80px; height: 1px;
      background: repeating-linear-gradient(90deg, var(--gold-dim) 0, var(--gold-dim) 8px, transparent 8px, transparent 16px);
    }
    .ticket-header { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--gold); margin-bottom: 0.2rem; }
    .ticket-subtitle { font-family: var(--font-accent); font-size: 0.9rem; color: var(--white-50); letter-spacing: 2px; margin-bottom: 1.5rem; }
    .ticket-qr { margin: 1.5rem auto; display: flex; justify-content: center; }
    .ticket-qr canvas { border: 4px solid var(--gold-dim); border-radius: 2px; }
    .ticket-details { text-align: left; padding-top: 1.5rem; }
    .ticket-detail-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--white-10); }
    .ticket-detail-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim); }
    .ticket-detail-value { font-weight: 500; color: var(--cream); font-size: 0.9rem; }
    .ticket-id { margin-top: 1rem; font-family: monospace; font-size: 0.75rem; color: var(--white-50); letter-spacing: 1px; }

    /* FOOTER */
    footer { text-align: center; padding: 2rem; border-top: 1px solid var(--white-10); font-size: 0.8rem; color: var(--white-50); }
    footer a { color: var(--gold-dim); text-decoration: none; }
    footer a:hover { color: var(--gold); }

    /* STATUS */
    .status-msg { padding: 1rem; border-radius: 2px; margin-top: 1rem; font-size: 0.9rem; text-align: center; }
    .status-msg.success { background: rgba(76,201,120,0.1); border: 1px solid rgba(76,201,120,0.3); color: #7ddeaa; }
    .status-msg.error   { background: rgba(201,76,76,0.1);  border: 1px solid rgba(201,76,76,0.3);  color: #de7d7d; }

    /* SPINNER */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--gold-dim); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }

    /* ANIMATIONS */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn { from { opacity:0; transform:scaleX(0); }       to { opacity:1; transform:scaleX(1); }     }
    @keyframes spin    { to   { transform:rotate(360deg); }                                                         }

    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* FILM STRIP */
    .film-strip-top, .film-strip-bottom {
      height: 20px;
      background: repeating-linear-gradient(90deg, var(--gold-dim) 0, var(--gold-dim) 12px, transparent 12px, transparent 20px);
      opacity: 0.3;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0;
        background: rgba(10,22,40,0.97); padding: 1.5rem 2rem; gap: 1.2rem;
        border-bottom: 1px solid var(--white-10);
      }
      .nav-hamburger { display: flex; }
      .countdown { gap: 1rem; }
      .countdown-number { font-size: 2.2rem; }
      .countdown-separator { font-size: 1.8rem; }
      .form-container { padding: 2rem 1.5rem; }
      .timeline { padding-left: 1.5rem; }
      .timeline-item { padding-left: 1.5rem; }
    }
    @media (max-width: 480px) {
      .hero { padding: 5rem 1.2rem 3rem; }
      .countdown-item { min-width: 60px; }
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav id="navbar">
    <a href="#" class="nav-logo">JMC</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="#accueil">Accueil</a></li>
      <li><a href="#programme">Programme</a></li>
      <li><a href="#inscription">S'inscrire</a></li>
    </ul>
    <div class="nav-hamburger" id="hamburger" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="accueil">
    <p class="hero-badge">JMC Présente</p>
    <h1 class="hero-title">
      <span class="line1">Soirée</span>
      <span class="line2">Cinéma</span>
    </h1>
    <div class="hero-divider"></div>
    <p class="hero-info" id="hero-date"></p>
    <p class="hero-venue" id="hero-venue"></p>
    <span class="hero-free" id="hero-free">Entrée Libre</span>
    <div class="hero-cta">
      <a href="#inscription" class="btn-gold">Réserver ma Place</a>
    </div>
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown-section" id="countdown-section">
    <p class="countdown-label">L'événement commence dans</p>
    <div class="countdown" id="countdown"></div>
  </section>

  <div class="film-strip-top"></div>

  <!-- PROGRAMME (rendu par app.js depuis config) -->
  <section class="programme" id="programme">
    <p class="section-label reveal">Déroulement</p>
    <h2 class="section-title reveal">Programme de la Soirée</h2>
    <div class="timeline" id="timeline"></div>
  </section>

  <div class="film-strip-bottom"></div>

  <!-- INSCRIPTION -->
  <section class="inscription" id="inscription">
    <p class="section-label reveal">Réservation</p>
    <h2 class="section-title reveal">Réservez Votre Place</h2>

    <div class="form-container reveal" id="form-container">
      <form id="regForm" novalidate>
        <div class="form-group">
          <label for="fullName">Nom et Prénom</label>
          <input type="text" id="fullName" name="full_name" placeholder="Ex: Aurelie Mbarga" required>
        </div>
        <div class="form-group">
          <label for="gender">Sexe</label>
          <select id="gender" name="gender" required>
            <option value="">Sélectionnez...</option>
            <option value="Homme">Homme</option>
            <option value="Femme">Femme</option>
          </select>
        </div>
        <div class="form-group">
          <label for="phone">Téléphone</label>
          <input type="tel" id="phone" name="phone" placeholder="Ex: 6XX XXX XXX" required>
        </div>
        <div class="form-group">
          <label for="church">Église</label>
          <input type="text" id="church" name="church" placeholder="Ex: MEEC CENTRE" required>
        </div>
        <div class="form-group">
          <label for="email">
            Email
            <span style="color:var(--white-50);font-size:0.7rem;text-transform:none;letter-spacing:0;">(optionnel)</span>
          </label>
          <input type="email" id="email" name="email" placeholder="Ex: aureliembarga@gmail.com">
        </div>
        <div id="places-restantes" style="text-align:center;margin-bottom:0.8rem;font-size:0.9rem;color:var(--gold-light);"></div>
        <button type="submit" class="btn-gold btn-full" id="submitBtn">Réserver ma Place</button>
        <div id="form-status"></div>
      </form>
    </div>

    <!-- TICKET / CONFIRMATION -->
    <div id="confirmation">
      <div class="ticket-card" id="ticket-card">
        <div class="ticket-header" id="ticket-header"></div>
        <div class="ticket-subtitle" id="ticket-subtitle"></div>
        <div class="ticket-qr">
          <canvas id="qrcodeCanvas"></canvas>
        </div>
        <div class="ticket-details" id="ticketDetails"></div>
        <div class="ticket-id" id="ticketId"></div>
      </div>
      <button class="btn-gold btn-full" id="downloadTicketBtn" onclick="downloadTicket()">Télécharger mon Ticket</button>
      <div style="margin-top:1rem;">
        <button class="btn-outline" onclick="resetForm()">Nouvelle inscription</button>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 JMC — Soirée Cinéma. Tous droits réservés. | <a href="admin.html">Admin</a></p>
  </footer>

  <!-- Scripts (config avant app) -->
  <script src="js/config.js"></script>
  <script src="js/app.js" defer></script>

</body>
</html>
